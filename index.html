        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: #121212; color: #ffffff; margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; overscroll-behavior-y: none;}
        
        .header-container { display: flex; justify-content: space-between; align-items: center; width: 100%; max-width: 600px; position: relative; margin-bottom: 20px;}
        /* 這裡加上 padding: 0 45px 讓標題不會撞到按鈕 */
        h1 { color: #e0e0e0; font-size: 1.45rem; margin: 0; flex-grow: 1; text-align: center; letter-spacing: 1px; padding: 0 45px; line-height: 1.3;}
        .title-logo { height: 1.3em; vertical-align: middle; margin-right: 8px; margin-bottom: 4px; }
        .menu-btn { background: none; border: none; color: #e0e0e0; font-size: 1.8rem; cursor: pointer; padding: 5px; position: absolute; right: 0; outline: none; -webkit-tap-highlight-color: transparent;}
        .date-menu { position: absolute; top: 45px; right: 0; background-color: #1e1e1e; border: 1px solid #444; border-radius: 8px; box-shadow: 0 8px 16px rgba(0,0,0,0.8); display: none; flex-direction: column; z-index: 100; overflow: hidden; min-width: 180px;}
        .date-menu.open { display: flex; }
        .menu-item { padding: 14px 20px; border-bottom: 1px solid #333; cursor: pointer; color: #ccc; font-size: 1rem; text-align: center;}
        .menu-item:last-child { border-bottom: none; }
        .menu-item:hover { background-color: #2a2a2a; color: #fff; }
        .menu-item.active { background-color: #bb86fc; color: #121212; font-weight: bold; }

        #games-container { width: 100%; max-width: 600px; display: flex; flex-direction: column; gap: 20px; padding-bottom: 30px;}

        .game-card { background-color: #1e1e1e; border-radius: 12px; padding: 20px; box-shadow: 0 4px 8px rgba(0, 0, 0, 0.4); border: 1px solid #333; }
        .game-date-badge { text-align: center; color: #888; font-size: 0.85rem; margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px dashed #333; letter-spacing: 1px;}
        .score-board { display: flex; justify-content: space-between; align-items: center; padding-bottom: 15px; }
        .team-box { text-align: center; width: 35%; }
        .team-name { font-size: 1.2rem; font-weight: bold; margin-bottom: 8px; color: #bb86fc; }
        .score { font-size: 2.5rem; font-weight: 900; }
        .game-status { width: 30%; text-align: center; font-size: 0.95rem; color: #aaaaaa; }
        .live-indicator { color: #ff5252; font-weight: bold; animation: blink 1.5s infinite; font-size: 1rem;}
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0; } 100% { opacity: 1; } }

        .linescore-wrapper { width: 100%; overflow-x: auto; margin-bottom: 15px; background-color: #1a1a1a; border-radius: 8px; border: 1px solid #333; padding: 8px 0;}
        .linescore-table { width: 100%; border-collapse: collapse; text-align: center; font-size: 0.85rem; font-family: monospace;}
        .linescore-table th, .linescore-table td { padding: 5px 4px; }
        .linescore-table th { color: #888; font-weight: normal; border-bottom: 1px solid #333;}
        .linescore-table td { color: #ddd; }
        .linescore-table .team-col { text-align: left; padding-left: 10px; font-weight: bold; color: #bb86fc; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;}
        .linescore-table .total-col { background-color: #222; font-weight: bold; }
        .linescore-table .total-runs { color: #fff; font-size: 1rem; }
        .linescore-table .total-hits, .linescore-table .total-errors { color: #aaa; }

        .pbp-container { background-color: #1a1a1a; border: 1px solid #333; border-left: 4px solid #ff5252; padding: 12px; border-radius: 8px; font-size: 0.95rem; line-height: 1.5; margin-bottom: 15px;}
        .pbp-label { color: #ff5252; font-weight: bold; margin-bottom: 8px; font-size: 0.85rem; border-bottom: 1px solid #333; padding-bottom: 4px; }
        .pbp-text { color: #e0e0e0; display: flex; align-items: flex-start; gap: 6px; }
        .pbp-text.old-play { color: #888; font-size: 0.85rem; margin-top: 8px; padding-top: 8px; border-top: 1px dashed #333; }

        .live-details { display: flex; justify-content: space-between; align-items: center; background-color: #2a2a2a; border-radius: 10px; padding: 12px 15px; font-size: 0.95rem; margin-bottom: 15px;}
        .field-status { display: flex; align-items: center; gap: 15px; }
        .bases { display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .base-row { display: flex; gap: 16px; }
        .base { width: 14px; height: 14px; background-color: #444; transform: rotate(45deg); border: 1px solid #222; }
        .base.active { background-color: #ffeb3b; box-shadow: 0 0 8px rgba(255, 235, 59, 0.6); }
        .count { display: flex; flex-direction: column; font-family: monospace; font-size: 1.1rem; color: #ccc;}
        .count span { font-weight: bold; }
        .c-balls { color: #4caf50; } .c-strikes { color: #ff5252; } .c-outs { color: #ff9800; }    
        
        /* 👇 這裡幫你把排版修好了，保證不斷字 👇 */
        .player-info { display: flex; flex-direction: column; gap: 6px; width: 62%; }
        .player-row { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px dashed #444; padding-bottom: 3px; }
        .player-row:last-child { border-bottom: none; }
        .label { color: #888; font-size: 0.85rem; white-space: nowrap; flex-shrink: 0; }
        .name { color: #fff; font-weight: bold; text-align: right; flex-grow: 1; margin-left: 10px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;}
        /* 👆 排版修正結束 👆 */

        .lineup-container { display: flex; justify-content: space-between; background-color: #1a1a1a; padding: 12px; border-radius: 8px; border: 1px solid #333;}
        .team-lineup { width: 48%; }
        .team-lineup h4 { margin: 0 0 10px 0; color: #bb86fc; text-align: center; border-bottom: 1px solid #444; padding-bottom: 6px; font-size: 0.95rem;}
        .lineup-item { display: flex; gap: 8px; margin-bottom: 6px; align-items: center;}
        .bat-num { color: #888; width: 18px; text-align: right; font-family: monospace; font-size: 0.9rem;}
        .bat-name { color: #ccc; font-size: 0.9rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;}
        
        details.final-details-toggle { margin-top: 5px; background-color: #1e1e1e; border-radius: 8px; border: 1px solid #444; }
        details.final-details-toggle summary { padding: 12px; cursor: pointer; color: #bb86fc; font-weight: bold; font-size: 0.95rem; text-align: center; list-style: none; user-select: none; -webkit-tap-highlight-color: transparent;}
        details.final-details-toggle summary::-webkit-details-marker { display: none; } 
        details.final-details-toggle[open] summary { border-bottom: 1px dashed #444; color: #aaa; }
        .toggle-content { padding: 15px; display: flex; flex-direction: column; gap: 15px; }
        .toggle-content .pbp-container, .toggle-content .lineup-container { margin-bottom: 0; } 

        .tv-board { background: #0a0a0a; border: 2px solid #333; border-radius: 8px; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
        .tv-header { background: linear-gradient(90deg, #1a2a6c, #112952); color: white; text-align: center; padding: 8px; font-weight: bold; font-size: 0.95rem; border-bottom: 2px solid #444; letter-spacing: 1px;}
        .tv-table { width: 100%; border-collapse: collapse; text-align: center; }
        .tv-table td { border: 1px solid #222; padding: 8px 5px; font-size: 0.9rem; }
        .tv-table .tv-label { background-color: #111; color: #bb86fc; font-weight: bold; width: 34%; border-left: 2px solid #333; border-right: 2px solid #333;}
        .tv-table .tv-value { background-color: #1a1a1a; color: #fff; width: 33%; font-weight: bold; font-size: 1.05rem; }
        .tv-decisions { background-color: #111; border-top: 2px solid #444; display: flex; flex-direction: column; }
        .tv-dec-row { display: flex; border-bottom: 1px solid #222; }
        .tv-dec-row:last-child { border-bottom: none; }
        .tv-dec-label { width: 35%; padding: 6px; background: #1a1a1a; color: #888; text-align: center; font-size: 0.85rem; border-right: 1px solid #333;}
        .tv-dec-name { width: 65%; padding: 6px 12px; color: #e0e0e0; font-size: 0.9rem; font-weight: bold; }

        .loading { text-align: center; color: #888; font-size: 1.1rem; padding: 20px; width: 100%;}
    </style>

            // 1. 如果巨無霸字典裡有，直接給中文
            if (translateDict[name]) {

            // 2. 如果字典沒有，且「這支手機之前沒通報過」，就加進待通報清單
            if (!reportedWords.has(name) && !pendingReport.has(name)) {

        };

        // 🌟 批次傳送未知單字給 n8n 的函數 🌟
        function reportUnknownWords() {

            // 用「射後不理」的方式丟給 n8n，不影響網頁運作
            fetch(N8N_WEBHOOK_URL, {

                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ words: wordsToReport })
            }).catch(e => console.error("通報失敗:", e));

            // 把這些字加進「已通報」的記憶體裡，並存入瀏覽器

        function buildMenu() {
            const menu = document.getElementById('date-menu');
            menu.innerHTML = '';
            const now = new Date();

            const todayItem = document.createElement('div');
            todayItem.className = `menu-item ${currentSelectedDate === 'today' ? 'active' : ''}`;
            todayItem.innerText = '⭐ 今日最新賽程';
            todayItem.onclick = () => selectDate('today');
            menu.appendChild(todayItem);

            const yesterday = new Date(now);
            yesterday.setDate(yesterday.getDate() - 1);
            yesterday.setHours(0, 0, 0, 0);
            
            let iterDate = new Date(yesterday);
            tournamentStartDate.setHours(0, 0, 0, 0);

            while (iterDate >= tournamentStartDate) {
                const yyyy = iterDate.getFullYear();
                const mm = String(iterDate.getMonth() + 1).padStart(2, '0');
                const dd = String(iterDate.getDate()).padStart(2, '0');
                const dateString = `${yyyy}-${mm}-${dd}`;

        async function fetchWBCGames() {
            const container = document.getElementById('games-container');
            
            // 💡 老爸的魔法記憶卡：在覆蓋畫面之前，先抄下目前哪些選單是打開的！
            const currentlyOpenGamePks = Array.from(document.querySelectorAll('details.final-details-toggle[open]'))
                                             .map(d => d.getAttribute('data-gamepk'));

            const isTodayMode = currentSelectedDate === 'today';
            const targetDate = isTodayMode ? new Date() : new Date(currentSelectedDate);
            
            const fetchStart = new Date(targetDate); fetchStart.setDate(fetchStart.getDate() - 1);
            const fetchEnd = new Date(targetDate); fetchEnd.setDate(fetchEnd.getDate() + 1);
            const formatDate = (date) => `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}-${String(date.getDate()).padStart(2, '0')}`;
            
            const apiUrl = `https://statsapi.mlb.com/api/v1/schedule?sportId=51&hydrate=team,linescore,boxscore,decisions&startDate=${formatDate(fetchStart)}&endDate=${formatDate(fetchEnd)}`;

            try {
                const response = await fetch(apiUrl);
                const data = await response.json();
                if (!data.dates || data.dates.length === 0) { container.innerHTML = '<div class="loading">無賽程資料 🙇‍♂️</div>'; return; }

                let allGames = [];
                data.dates.forEach(dateObj => { allGames = allGames.concat(dateObj.games); });

                    const gameTime = new Date(game.gameDate);
                    const isTargetDate = gameTime.getDate() === targetDate.getDate() && gameTime.getMonth() === targetDate.getMonth();
                    
                    if (isTodayMode) {
                        const isLiveNow = game.status.statusCode === 'I' || game.status.statusCode === 'PW';
                        return isTargetDate || isLiveNow;
                    } else {
                        return isTargetDate;
                    }
                });

                if (filteredGames.length === 0) { container.innerHTML = '<div class="loading">此日期無賽程資料 🙇‍♂️</div>'; return; }

                    let linescoreTableHtml = '';
                    let liveDetailsHtml = '';
                    let pbpTextHtml = '';
                    let lineupHtml = '';
                    let tvBoardHtml = '';

                        const maxInnings = Math.max(9, ls.currentInning || 9, ls.innings.length);

                        let awayRow = `<td class="team-col">${awayTeam}</td>`;
                        let homeRow = `<td class="team-col">${homeTeam}</td>`;

                        for (let i = 1; i <= maxInnings; i++) {
                            headerRow += `<th>${i}</th>`;
                            const inn = ls.innings.find(x => x.num === i);
                            const awayRuns = inn && inn.away && inn.away.runs !== undefined ? inn.away.runs : '';
                            const homeRuns = inn && inn.home && inn.home.runs !== undefined ? inn.home.runs : '';
                            awayRow += `<td>${awayRuns}</td>`;
                            homeRow += `<td>${homeRuns}</td>`;
                        }

                        headerRow += '<th class="total-col" style="padding-left:10px;">R</th><th class="total-col">H</th><th class="total-col">E</th>';
                        awayRow += `<td class="total-col total-runs" style="padding-left:10px;">${ls.teams.away.runs ?? '-'}</td><td class="total-col total-hits">${ls.teams.away.hits ?? '-'}</td><td class="total-col total-errors">${ls.teams.away.errors ?? '-'}</td>`;
                        homeRow += `<td class="total-col total-runs" style="padding-left:10px;">${ls.teams.home.runs ?? '-'}</td><td class="total-col total-hits">${ls.teams.home.hits ?? '-'}</td><td class="total-col total-errors">${ls.teams.home.errors ?? '-'}</td>`;

                        linescoreTableHtml = `<div class="linescore-wrapper"><table class="linescore-table"><thead><tr>${headerRow}</tr></thead><tbody><tr>${awayRow}</tr><tr>${homeRow}</tr></tbody></table></div>`;
                    }

                    try {
                        const liveRes = await fetch(`https://statsapi.mlb.com/api/v1.1/game/${game.gamePk}/feed/live`);
                        const liveData = await liveRes.json();
                        
                        let playDescs = [];
                        const allPlays = liveData.liveData?.plays?.allPlays || [];
                        for (let i = allPlays.length - 1; i >= 0; i--) {
                            if (allPlays[i].result?.description) {
                                playDescs.push(allPlays[i].result.description);
                                if (playDescs.length === 2) break; 
                            }
                        }

                        if (playDescs.length > 0) {
                            let pbpContent = '';
                            if (isLive) {
                                pbpContent += `<div class="pbp-text"><span style="color:#ff5252; animation: blink 1.5s infinite;">●</span> <span>${translatePlay(playDescs[0])}</span></div>`;
                                if (playDescs.length > 1) {
                                    pbpContent += `<div class="pbp-text old-play"><span style="color:#888;">○</span> <span>${translatePlay(playDescs[1])}</span></div>`;
                                }
                                pbpTextHtml = `<div class="pbp-container"><div class="pbp-label">最新賽況轉播</div>${pbpContent}</div>`;
                            } else {
                                pbpContent += `<div class="pbp-text"><span>💬</span> <span>${translatePlay(playDescs[0])}</span></div>`;
                                if (playDescs.length > 1) {
                                    pbpContent += `<div class="pbp-text old-play"><span>💬</span> <span>${translatePlay(playDescs[1])}</span></div>`;
                                }
                                pbpTextHtml = `<div class="pbp-container"><div class="pbp-label" style="color:#aaa;">最終賽況紀錄</div>${pbpContent}</div>`;
                            }
                        }
                        liveDataBoxscore = liveData.liveData?.boxscore;
                    } catch (e) { console.error('PBP Error:', e); }

                    if (isLive && game.linescore) {
                        const ls = game.linescore, off = ls.offense || {}, def = ls.defense || {};
                        const b1 = off.first ? 'active' : '', b2 = off.second ? 'active' : '', b3 = off.third ? 'active' : '';
                        
                        // 👇 這裡幫你把圖示換成 🖐🏽 投手, 🏏 打者, 👉🏽 下位 了！ 👇
                        liveDetailsHtml = `<div class="live-details"><div class="field-status"><div class="bases"><div class="base second ${b2}"></div><div class="base-row"><div class="base third ${b3}"></div><div class="base first ${b1}"></div></div></div><div class="count"><div class="c-balls">B <span>${ls.balls || 0}</span></div><div class="c-strikes">S <span>${ls.strikes || 0}</span></div><div class="c-outs">O <span>${ls.outs || 0}</span></div></div></div><div class="player-info"><div class="player-row"><span class="label">🖐🏽 投手</span> <span class="name">${translate(def.pitcher?.fullName)}</span></div><div class="player-row"><span class="label">🏏 打者</span> <span class="name">${translate(off.batter?.fullName)}</span></div><div class="player-row"><span class="label">👉🏽 下位</span> <span class="name">${translate(off.onDeck?.fullName || '準備中')}</span></div></div></div>`;
                        // 👆 圖示修改結束 👆
                    }

                    const boxscoreToUse = liveDataBoxscore || game.boxscore;
                    if (boxscoreToUse) {
                        const getLineup = (teamBox) => {
                            if (!teamBox) return [];
                            let order = (teamBox.battingOrder && teamBox.battingOrder.length > 0) ? teamBox.battingOrder : (teamBox.batters || []);
                            return order.map(id => {
                                const p = teamBox.players['ID' + id];
                                return p ? (p.person?.fullName || p.fullName) : '';
                            }).filter(n => n !== '').slice(0, 9);
                        };
                        
                        const awayLineup = getLineup(boxscoreToUse.teams?.away);
                        const homeLineup = getLineup(boxscoreToUse.teams?.home);

                        if (awayLineup.length > 0 && homeLineup.length > 0) {
                            let awayList = '', homeList = '';
                            for(let i=0; i<9; i++) {
                                const aName = awayLineup[i] ? translate(awayLineup[i]) : '-';
                                const hName = homeLineup[i] ? translate(homeLineup[i]) : '-';
                                awayList += `<div class="lineup-item"><span class="bat-num">${i+1}.</span><span class="bat-name">${aName}</span></div>`;
                                homeList += `<div class="lineup-item"><span class="bat-num">${i+1}.</span><span class="bat-name">${hName}</span></div>`;
                            }
                            lineupHtml = `<div class="lineup-container"><div class="team-lineup"><h4>${awayTeam}</h4>${awayList}</div><div class="team-lineup"><h4>${homeTeam}</h4>${homeList}</div></div>`;
                        }

                        if (!isLive) {
                            const aStats = boxscoreToUse.teams?.away?.teamStats || {};
                            const hStats = boxscoreToUse.teams?.home?.teamStats || {};
                            const dec = game.decisions || {};
                            const getStat = (team, cat, stat) => team && team[cat] && team[cat][stat] !== undefined ? team[cat][stat] : 0;
                            
                            const aHits = getStat(aStats, 'batting', 'hits'), hHits = getStat(hStats, 'batting', 'hits');
                            const aHR = getStat(aStats, 'batting', 'homeRuns'), hHR = getStat(hStats, 'batting', 'homeRuns');
                            const aK = getStat(aStats, 'batting', 'strikeOuts'), aBB = getStat(aStats, 'batting', 'baseOnBalls');
                            const hK = getStat(hStats, 'batting', 'strikeOuts'), hBB = getStat(hStats, 'batting', 'baseOnBalls');
                            const aErr = getStat(aStats, 'fielding', 'errors'), hErr = getStat(hStats, 'fielding', 'errors');
                            const aLOB = game.linescore?.teams?.away?.leftOnBase ?? 0, hLOB = game.linescore?.teams?.home?.leftOnBase ?? 0;

                            const wp = dec.winner ? translate(dec.winner.fullName) : '無', lp = dec.loser ? translate(dec.loser.fullName) : '無', sv = dec.save ? translate(dec.save.fullName) : null; 

                            tvBoardHtml = `
                                <div class="tv-board">
                                    <div class="tv-header">📊 賽事最終結果</div>
                                    <table class="tv-table">
                                        <tr><td class="tv-value" style="color:#fff;">${awayTeam}</td><td class="tv-label">隊 伍</td><td class="tv-value" style="color:#fff;">${homeTeam}</td></tr>
                                        <tr><td class="tv-value">${aHits}</td><td class="tv-label">安 打</td><td class="tv-value">${hHits}</td></tr>
                                        <tr><td class="tv-value">${aHR}</td><td class="tv-label">全壘打</td><td class="tv-value">${hHR}</td></tr>
                                        <tr><td class="tv-value">${aK}-${aBB}</td><td class="tv-label">三振-保送</td><td class="tv-value">${hK}-${hBB}</td></tr>
                                        <tr><td class="tv-value">${aLOB}</td><td class="tv-label">殘 壘</td><td class="tv-value">${hLOB}</td></tr>
                                        <tr><td class="tv-value">${aErr}</td><td class="tv-label">失 誤</td><td class="tv-value">${hErr}</td></tr>
                                    </table>
                                    <div class="tv-decisions">
                                        <div class="tv-dec-row"><div class="tv-dec-label">勝利投手</div><div class="tv-dec-name">${wp}</div></div>
                                        <div class="tv-dec-row"><div class="tv-dec-label">敗戰投手</div><div class="tv-dec-name">${lp}</div></div>
                                        ${sv ? `<div class="tv-dec-row"><div class="tv-dec-label">救援成功</div><div class="tv-dec-name">${sv}</div></div>` : ''}
                                    </div>
                                </div>
                            `;
                        }
                    }

                    let extraInfoHtml = '';
                    if (isLive) {
                        extraInfoHtml = `${pbpTextHtml}${liveDetailsHtml}${lineupHtml}`;
                    } else {
                        if (tvBoardHtml || pbpTextHtml || lineupHtml) {
                            // 💡 老爸的魔法記憶卡：如果這個 gamePk 剛剛有被抄下來，就幫它加上 'open' 屬性！
                            const isOpen = currentlyOpenGamePks.includes(String(game.gamePk)) ? 'open' : '';
                            
                            // 加上 data-gamepk 屬性，讓程式認得這是哪一場比賽
                            extraInfoHtml = `<details class="final-details-toggle" data-gamepk="${game.gamePk}" ${isOpen}><summary>🔽 展開對戰結果與詳細賽況</summary><div class="toggle-content">${tvBoardHtml}${pbpTextHtml}${lineupHtml}</div></details>`;
                        }
                    }

                    const cardHtml = `
                        <div class="game-card">
                            <div class="game-date-badge">📅 ${timeString}</div>
                            <div class="score-board">
                                <div class="team-box"><div class="team-name">${awayTeam}</div><div class="score">${awayScore}</div></div>
                                <div class="game-status">${statusHtml}</div>
                                <div class="team-box"><div class="team-name">${homeTeam}</div><div class="score">${homeScore}</div></div>
                            </div>
                            ${linescoreTableHtml}
                            ${extraInfoHtml}
                        </div>
                    `;

                    if (isLive) liveGamesHtml += cardHtml;
                    else finalGamesHtml += cardHtml;
                }
                
                container.innerHTML = (liveGamesHtml + finalGamesHtml) || '<div class="loading">此日期無賽程資料</div>';
         // 👇 新增這行：畫面更新完後，把沒看過的單字批次送給 n8n
                reportUnknownWords();

            } catch (error) { console.error('API Error:', error); container.innerHTML = '<div class="loading">連線失敗，請檢查網路狀態。</div>'; }
        }

        document.addEventListener('click', function(event) {
            const menu = document.getElementById('date-menu');
            const btn = document.querySelector('.menu-btn');
            if (!menu.contains(event.target) && event.target !== btn && menu.classList.contains('open')) {
                menu.classList.remove('open');
            }
        });

        fetchWBCGames();
        
        setInterval(() => {
            if (currentSelectedDate === 'today') {
                fetchWBCGames();
            }
        }, 5000); 
    </script>
</body>

</html>
